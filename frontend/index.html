<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Registry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="bg-texture"></div>
  <div class="runes-overlay"></div>

  <header>
    <div class="header-inner">
      <div class="emblem">⚔️</div>
      <div>
        <h1>Dungeon Registry</h1>
        <p class="subtitle">Grimório dos Aventureiros do Reino</p>
      </div>
    </div>
  </header>

  <main>

    <section class="card" id="section-search-filter">
      <div class="search-filter-grid">

        <div class="search-block">
          <h2><span class="icon"></span> Buscar por ID</h2>
          <div class="search-row">
            <input type="number" id="busca-id" placeholder="ID do aventureiro..." min="1" />
            <button class="btn-secondary" onclick="buscarPorId()">Invocar</button>
          </div>
          <div id="resultado-id"></div>
        </div>

        <div class="divider-v"></div>

        <div class="filter-block">
          <h2><span class="icon"></span> Filtrar Grimório</h2>
          <div class="filter-row">
            <div class="field">
              <label for="filtro-classe">Por Classe</label>
              <select id="filtro-classe">
                <option value="">Todas as Classes</option>
                <option value="Guerreiro">Guerreiro</option>
                <option value="Mago">Mago</option>
                <option value="Ladino">Ladino</option>
                <option value="Paladino">Paladino</option>
                <option value="Arqueiro">Arqueiro</option>
                <option value="Necromante">Necromante</option>
              </select>
            </div>
            <div class="field">
              <label for="filtro-raca">Por Raça</label>
              <select id="filtro-raca">
                <option value="">Todas as Raças</option>
                <option value="Humano">Humano</option>
                <option value="Elfo">Elfo</option>
                <option value="Anão">Anão</option>
                <option value="Orc">Orc</option>
                <option value="Halfling">Halfling</option>
                <option value="Tiefling">Tiefling</option>
              </select>
            </div>
            <div class="filter-btns">
              <button class="btn-secondary" onclick="filtrarPersonagens()">Aplicar Filtro</button>
              <button class="btn-ghost" onclick="limparFiltros()">Limpar</button>
            </div>
          </div>
        </div>

      </div>
    </section>


    <div class="bottom-grid">

      <section class="card" id="section-form">
        <h2><span class="icon"></span> Registrar Aventureiro</h2>
        <form id="form-personagem">
          <div class="form-grid">
            <div class="field">
              <label for="nome">Nome do Personagem</label>
              <input type="text" id="nome" placeholder="Ex: Aldric o Bravo" required />
            </div>
            <div class="field">
              <label for="classe">Classe</label>
              <select id="classe" required>
                <option value="">— Escolha —</option>
                <option value="Guerreiro">Guerreiro</option>
                <option value="Mago">Mago</option>
                <option value="Ladino">Ladino</option>
                <option value="Paladino">Paladino</option>
                <option value="Arqueiro">Arqueiro</option>
                <option value="Necromante">Necromante</option>
              </select>
            </div>
            <div class="field">
              <label for="raca">Raça</label>
              <select id="raca" required>
                <option value="">— Escolha —</option>
                <option value="Humano">Humano</option>
                <option value="Elfo">Elfo</option>
                <option value="Anão">Anão</option>
                <option value="Orc">Orc</option>
                <option value="Halfling">Halfling</option>
                <option value="Tiefling">Tiefling</option>
              </select>
            </div>
            <div class="field">
              <label for="nivel">Nível (1-20)</label>
              <input type="number" id="nivel" min="1" max="20" placeholder="Ex: 7" required />
            </div>
            <div class="field">
              <label for="forca">Força (1-20)</label>
              <input type="number" id="forca" min="1" max="20" placeholder="Ex: 14" required />
            </div>
            <div class="field">
              <label for="habilidade_especial">Habilidade Especial</label>
              <input type="text" id="habilidade_especial" placeholder="Ex: Golpe Trovejante" required />
            </div>
          </div>
          <button type="submit" class="btn-primary">Inscrever no Grimório</button>
          <div id="form-msg" class="msg"></div>
        </form>
      </section>

      <section id="section-lista">
        <div class="lista-header">
          <h2><span class="icon"></span> Grimório Completo</h2>
          <span id="total-badge" class="badge">0 aventureiros</span>
        </div>
        <div id="lista-personagens" class="grid-personagens"></div>
      </section>

    </div>

  </main>

  <footer>
    <p>Dungeon Registry · FastAPI + JavaScript · Checkpoint 02</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
